<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Připravujeme</title>

<!-- Dočasná stránka je záměrně neutrální: neuvádí název subjektu, obec, obsah
     chystaného webu ani žádné datum. Nesmí prozradit nic, co by nemělo být
     venku dřív než ostrá verze. Proto tu nejsou ani firemní barvy a znak.
     Zároveň ji nechceme mít v indexu vyhledávačů. -->
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

<!-- Neutrální favicon, aby karta prohlížeče nepůsobila rozbitě -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='34' fill='none' stroke='%239AA1AC' stroke-width='9'/></svg>">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 32px 20px;
    font-family: "Lato", "Segoe UI", system-ui, sans-serif;
    background: #F4F5F7;
    color: #3C424D;
  }

  .obsah {
    text-align: center;
    max-width: 420px;
  }

  .znak {
    width: 46px;
    height: 46px;
    margin: 0 auto 26px;
    border-radius: 50%;
    border: 3px solid #C9CFD8;
  }

  h1 {
    margin: 0 0 14px;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: .01em;
    color: #2B313B;
  }

  p {
    margin: 0;
    font-size: 1.02rem;
    line-height: 1.6;
    color: #6B7280;
  }
</style>
</head>

<body>
  <div class="obsah">
    <div class="znak" aria-hidden="true"></div>
    <h1>Připravujeme</h1>
    <p>Na těchto stránkách se pracuje. Děkujeme za trpělivost.</p>
  </div>
</body>
</html>
